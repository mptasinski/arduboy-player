<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduboy Player</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    header img.logo {
      height: 48px;
      width: auto;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── No-game placeholder ─────────────────────────────────── */
    .no-game {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 20px;
      text-align: center;
    }

    .no-game img.bg {
      width: 260px;
      max-width: 90vw;
      filter: drop-shadow(0 4px 24px rgba(0, 180, 255, 0.35));
    }

    .no-game h2 {
      font-size: 1.4rem;
      color: #aad4ff;
    }

    .no-game p {
      max-width: 560px;
      line-height: 1.6;
      color: #b0b8cc;
    }

    .no-game code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: #7ecfff;
    }

    /* ── Emulator layout ─────────────────────────────────────── */
    .player-layout {
      width: 100%;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .emulator-wrapper {
      flex: 1 1 640px;
      min-height: 480px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0, 180, 255, 0.2);
    }

    .emulator-wrapper iframe {
      width: 100%;
      height: 640px;
      border: none;
      display: block;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      flex: 0 0 260px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar img.device {
      width: 100%;
      filter: drop-shadow(0 4px 24px rgba(0, 180, 255, 0.35));
    }

    .controls-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .controls-card h2 {
      font-size: 1rem;
      color: #7ecfff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 8px;
    }

    .controls-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .controls-table tr + tr td {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .controls-table td {
      padding: 6px 4px;
      vertical-align: top;
    }

    .controls-table td:first-child {
      white-space: nowrap;
      padding-right: 12px;
    }

    .key {
      display: inline-block;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 0.85em;
      color: #e8e8e8;
    }

    footer {
      width: 100%;
      padding: 16px 24px;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    footer a {
      color: #7ecfff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <img class="logo" src="assets/arduboy.png" alt="Arduboy" />
    <h1>Arduboy Player</h1>
  </header>

  <main id="main">
    <!-- Content injected by JavaScript -->
  </main>

  <footer>
    Powered by <a href="https://github.com/tiberiusbrown/Ardens" target="_blank" rel="noopener">Ardens</a> &mdash;
    Arduboy image from <a href="https://github.com/felipemanga/ProjectABE" target="_blank" rel="noopener">ProjectABE</a>
  </footer>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var fileUrl = params.get('file');
      var main = document.getElementById('main');

      var controls = [
        { keys: ['↑', '↓', '←', '→'], desc: 'D-pad' },
        { keys: ['A', 'Z'], desc: 'A button' },
        { keys: ['S', 'X', 'B'], desc: 'B button' },
        { keys: ['F2'], desc: 'Save screenshot' },
        { keys: ['F3'], desc: 'Toggle GIF recording' },
        { keys: ['F8'], desc: 'Reset' },
      ];

      function buildKeySpans(keys) {
        return keys.map(function (k) {
          return '<span class="key">' + k + '</span>';
        }).join(' ');
      }

      function buildControlsCard() {
        var rows = controls.map(function (c) {
          return '<tr><td>' + buildKeySpans(c.keys) + '</td><td>' + c.desc + '</td></tr>';
        }).join('');
        return '<div class="controls-card">'
          + '<h2>Controls</h2>'
          + '<table class="controls-table"><tbody>' + rows + '</tbody></table>'
          + '</div>';
      }

      if (fileUrl) {
        var ardensUrl = 'https://tiberiusbrown.github.io/Ardens/player.html?file=' + encodeURIComponent(fileUrl);
        main.innerHTML =
          '<div class="player-layout">'
          + '<div class="emulator-wrapper">'
          +   '<iframe src="' + ardensUrl + '" title="Arduboy Emulator" allowfullscreen></iframe>'
          + '</div>'
          + '<div class="sidebar">'
          +   '<img class="device" src="assets/arduboy.png" alt="Arduboy device" />'
          +   buildControlsCard()
          + '</div>'
          + '</div>';
      } else {
        main.innerHTML =
          '<div class="no-game">'
          + '<img class="bg" src="assets/arduboy.png" alt="Arduboy device" />'
          + '<h2>No game loaded</h2>'
          + '<p>Pass a hex file URL via the <code>file</code> query parameter to play a game:</p>'
          + '<p><code>?file=https://example.com/game.hex</code></p>'
          + buildControlsCard()
          + '</div>';
      }
    })();
  </script>

</body>
</html>
